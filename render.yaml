services:
  - type: web
    name: zippasswordcrack
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /ping
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DATA_DIR
        value: /data
      - key: SITE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    disk:
      name: zipcracker-data
      mountPath: /data
      sizeGB: 1
